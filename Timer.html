<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>

body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #1a0026, #2b1055);
    color: white;
}

/* responsive card */
.card {
    width: min(90vw, 420px);
    padding: clamp(20px, 5vw, 50px);
    border-radius: 20px;
    text-align: center;

    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.15);
    box-shadow: 0 0 25px rgba(255, 0, 200, 0.15);
    backdrop-filter: blur(5px);
}

/* responsive text */
.title {
    font-size: clamp(0.9rem, 2vw, 1rem);
    letter-spacing: 2px;
    margin-bottom: 10px;
    color: #ff66cc;
}

.counter {
    font-size: clamp(1.5rem, 5vw, 2.2rem);
    font-weight: bold;
    text-shadow: 0 0 5px rgba(255, 102, 204, 0.6);
}

</style>
</head>
<body>

<div class="card">
    <div class="title">🎉TIME UNTIL BIRTHDAY🎂</div>
    <div id="counter" class="counter"></div>
</div>

<script>
function updateTimer() {
    const now = new Date();

    // Target: Tomorrow at 00:00:00
    const target = new Date(now);
    target.setDate(target.getDate() +1);
    target.setHours(0, 0, 0, 0);

    const diff = target - now;

    if (diff <= 0) {
        document.getElementById("counter").textContent = "00:00:00";
        window.location.href = "../ELAS_GEBURTSTAG/Main.html"; 
        return;
    }

    const hours = Math.floor(diff / (1000 * 60 * 60));
    const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((diff % (1000 * 60)) / 1000);

    document.getElementById("counter").textContent =
        `${String(hours).padStart(2, '0')}:` +
        `${String(minutes).padStart(2, '0')}:` +
        `${String(seconds).padStart(2, '0')}`;
}

updateTimer();
setInterval(updateTimer, 1000);
</script>

</body>
</html>
